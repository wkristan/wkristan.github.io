<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <title>Regression with quadratic term - likelihood app</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script>
    <link href="https://wkristan.github.io/style.css" rel="stylesheet" type="text/css">
    <script type="text/javascript" src="https://wkristan.github.io/main.js"></script>
    <link href="grid_layout_quad_regression.css" rel="stylesheet" type="text/css">
  </head>
  <body onload="drawPlotsQuad()">
    <div class="likelihood_wrapper">
      <div id="reg_quad_graph" class="left_graph"> </div>
      <div id="like_quad_regression" class="right_graph"> </div>
      <div id="reg_quad_controls_div" class="settings">
        <p><em> Regression equation - change the parameters to find the best
            line </em></p>
        <p>ŷ = <input id="quad_input" value="0" max="1" ,min="-1" step="0.001"
            oninput="updateOnChangeQuad()" style="width:60px" type="number"> x<sup>2</sup>
          + <input id="slope_quad_input" value="0" max="1.5" min="-3" step="0.002"
            oninput="updateOnChangeQuad()" style="width:60px" type="number"> x +
          <input id="int_quad_input" value="8.75" step="0.02" oninput="updateOnChangeQuad()"
            style="width:60px" type="number"></p>
      </div>
    </div>
    <script type="text/javascript" src="regression_quad.js"></script>
  </body>
</html>
