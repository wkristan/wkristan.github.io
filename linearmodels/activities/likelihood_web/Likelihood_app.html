<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
<meta http-equiv="content-type" content="text/html; charset=utf-8">

    
    <title>Likelihood app</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script>
    <link href="https://wkristan.github.io/style.css" rel="stylesheet" type="text/css">
    <link href="slider_style.css" rel="stylesheet" type="text/css">
    <link href="grid_layout_likelihood_alldat.css" rel="stylesheet" type="text/css">
    <script type="text/javascript" src="https://wkristan.github.io/main.js"></script>
  </head>
  <body onload="drawChart()">

      <div id="wrapper_div" class="likelihood_wrapper">
        <div class="left_graph" id="likelihood_curves"> </div>
        <div class="right_graph" id="likelihood_function">
        </div>
        <div class="slider">
        <div class="range-wrap" style="display: inline-block; width: 400px; border 1px solid yellow; clear: both; margin: 0 auto">
          <div class="range-value" id="rangeV_lin"></div>
          <input id="range_lin" min="119" max="136" value="119" step="0.1" type="range">
        </div>
        </div>
        <div class="like_type">
        <p><label for="liketype"> Choose a likelihood function: </label>
          <select id="liketype" name="liketype">
            <option value="like">Likelihood</option>
            <option value="loglike">Log likelihood</option>
            <option value="negloglike">Negative log likelihood</option>
          </select>
        </p>
        </div>
      </div>
         <script type="text/javascript" src="likelihood.js"></script></body></html>
