<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
<meta http-equiv="content-type" content="text/html; charset=utf-8">
    
    <title>Likelihood app p with profile ci</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script>
    <link href="https://wkristan.github.io/style.css" rel="stylesheet" type="text/css">
    <link href="slider_style.css" rel="stylesheet" type="text/css">
    <link href="grid_layout_likelihood_p.css" rel="stylesheet" type="text/css">
    <script type="text/javascript" src="https://wkristan.github.io/main.js"></script>
  </head>
  <body onload="drawChart()">
    <div class="likelihood_wrapper">
      <div class="left_graph" style="transform: rotate(10deg)" id="obs_data"> </div>
      <div class="settings">
        <p> N. alleles: <input id="n_alleles" value="20" min="1" style="width: 40px" type="number">&nbsp;&nbsp; N. hets: <input id="n_het" value="15" min="1" max="19" style="width: 40px" type="number"> </p>
      </div>
      <div class="right_graph" id="likelihood_function"> </div>
      <div class="slider" id="value_of_est">
        <div class="range-wrap" style="display: inline-block; width: 400px; border 1px solid yellow; clear: both; margin: 0 auto">
          <div class="range-value" id="rangeV"></div>
          <input id="range" min="0.01" max="0.99" value="0.5" step="0.01" type="range">
        </div>
      </div>
      <div class="like_type" id="type_of_likelihood">
        <p> <label for="liketype"> Choose a likelihood function: </label>
          <select id="liketype">
            <option value="like" selected="selected">Likelihood</option>
            <option value="loglike">Log likelihood</option>
            <option value="negloglike">Negative log likelihood</option>
            <option value="negll_min">Negative log likelihood with profile 95%
              CI</option>
          </select>
        </p>
      </div>
      <script type="text/javascript" src="likelihood_p_profile.js"></script> </div>
  

</body></html>
