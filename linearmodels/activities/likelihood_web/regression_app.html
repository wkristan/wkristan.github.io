<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <title>Regression - likelihood app</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script>
    <link href="https://wkristan.github.io/style.css" rel="stylesheet" type="text/css">
    <link href="grid_layout_regression.css" rel="stylesheet" type="text/css">
    <script type="text/javascript" src="https://wkristan.github.io/main.js"></script>
  </head>
  <body onload="drawRegPlots()">
    <div class="likelihood_wrapper">
      <div id="regression_graph" class="left_graph"> </div>
      <div id="reg_like_wrapper" class="like_type">
        <p><label for="liketype_reg"> Choose a likelihood function: </label>
          <select id="liketype_reg" onchange="updateOnChange()" style="clear:right">
            <option value="like">Likelihood</option>
            <option value="loglike">Log likelihood</option>
            <option value="negloglike">Negative log likelihood</option>
          </select>
          <br>
        </p>
      </div>
      <div id="likelihood_regression" class="right_graph"> </div>
      <div id="reg_controls_div" class="settings">
        <p><em> Regression equation - change the parameters to find the best
            line </em></p>
        <p>ŷ = <input id="slope_input" value="0" max="1.5" min="-1.5" step="0.002"
            oninput="updateOnChange()" style="width:60px" type="number"> x + <input
            id="int_input" value="8.75" step="0.02" oninput="updateOnChange()" style="width:60px"
            type="number"> </p>
      </div>
    </div>
    <script type="text/javascript" src="regression.js"></script>
  </body>
</html>
