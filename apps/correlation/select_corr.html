<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <title>Visualizing correlations of a given size</title>
    <link href="https://wkristan.github.io/style.css" rel="stylesheet" type="text/css">
    <script type="text/javascript" src="https://wkristan.github.io/main.js"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script>
    <script type="text/javascript" src="corr_selectable.js"></script>
  </head>
  <body onload="drawCharts()">
    <div id="chart_div" style="width: 400px; height: 400px;"></div>
    <p>Enter a value for r (between -1 and 1): 
      <input id="h2_val" min="-1" max="1" value="0.5" step="0.01" oninput="drawCharts()" style="width: 50px;" type="number"></p>
    
  </body>
</html>
