<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <title>Regression analysis</title>
    <link href="https://wkristan.github.io/style.css" rel="stylesheet" type="text/css">
    <script type="text/javascript" src="https://wkristan.github.io/main.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script>
    <style>
#canvas{border:1px solid red;background-color: ivory}</style>
  </head>
  <body>
    <div id="header">
      <h1>Regression models</h1>
    </div>
    <div id="content">
      <p> Draggable regression graph </p>
      <h4>Drag one or more of the data points, and see how the regression line
        changes</h4>
      <canvas id="canvas" width="500" height="300" style="float:left; margin-right: 20px"></canvas>
      <table class="tableLarge" style="float:left">
        <tbody>
          <tr>
            <th>Source</th>
            <th>df</th>
            <th>SS</th>
            <th>MS</th>
            <th>F</th>
            <th>p</th>
          </tr>
          <tr>
            <td>Concentration</td>
            <td>1</td>
            <td id="regression_ss"><br>
            </td>
            <td id="regression_ms"><br>
            </td>
            <td id="fval"><br>
            </td>
            <td id="pval"><br>
            </td>
          </tr>
          <tr>
            <td>Residual</td>
            <td>23</td>
            <td id="residual_ss"><br>
            </td>
            <td id="residual_ms"><br>
            </td>
            <td><br>
            </td>
            <td><br>
            </td>
          </tr>
          <tr>
            <td>Total</td>
            <td>24</td>
            <td id="total_ss"><br>
            </td>
            <td><br>
            </td>
            <td><br>
            </td>
            <td><br>
            </td>
          </tr>
        </tbody>
      </table>
      <br style="clear:both">
      <button id="reset" onclick="resetPoints()"> Reset </button> </div>
    <script type="text/javascript" src="draggable_regression.js"></script>
  </body>
</html>
