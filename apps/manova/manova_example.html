<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<html>
<head>
<meta http-equiv="content-type" content="text/html; charset=utf-8">
    
    <title>Hotelling example</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script>
    <script type="text/javascript" src="https://unpkg.com/mathjs@11.2.1/lib/browser/math.js"></script>
    <script src="manova_example.js"></script>
    <link href="https://wkristan.github.io/style.css" rel="stylesheet" type="text/css">
    <script type="text/javascript" src="https://wkristan.github.io/main.js"></script>
  </head>
  <body onload="drawPlot()">
    <h3>Hotelling's T<sup>2</sup> with two variables</h3>
    <div id="wrapper_div">
      <div id="manova_div" style="border: 2px solid black; width: 800px; height: 600px; float:left; margin-right: 10px">
      </div>
      <div style="float:left">
        <table>
          <tbody>
            <tr>
              <td><br>
              </td>
              <td colspan="2" style="text-align: center">
                <p><b>Population means</b></p>
              </td>
              <td><br>
              </td>
            </tr>
            <tr>
              <td><br>
              </td>
              <td style="text-align: center">
                <p>μ<sub>V1</sub></p>
              </td>
              <td style="text-align: center">
                <p>μ<sub>V2</sub></p>
              </td>
              <td style="text-align: center">
                <p>Correlation</p>
              </td>
            </tr>
            <tr>
              <td>
                <p>Group 1: </p>
              </td>
              <td style="text-align: center"><input id="mean1_1" min="80" max="120" value="100" onchange="drawPlot()" style="text-align: center" type="number"></td>
              <td style="text-align: center"><input id="mean1_2" min="80" max="120" value="100" onchange="drawPlot()" style="text-align: center" type="number"></td>
              <td style="text-align: center"><input id="grp1_corr" min="-1" max="1" value="0" step="0.01" onchange="drawPlot()" style="text-align: center" type="number"></td>
            </tr>
            <tr>
              <td><br>
              </td>
            </tr>
            <tr>
              <td><br>
              </td>
              <td style="text-align: center">
                <p>μ<sub>V1</sub></p>
              </td>
              <td style="text-align: center">
                <p>μ<sub>V2</sub></p>
              </td>
              <td style="text-align: center">
                <p>Correlation</p>
              </td>
            </tr>
            <tr>
              <td>
                <p>Group 2<span style="font-family: &quot;Crimson Text&quot;,serif;">: <br>
                  </span></p>
              </td>
              <td style="text-align: center"><input id="mean2_1" min="80" max="120" value="100" onchange="drawPlot()" style="text-align: center" type="number"></td>
              <td style="text-align: center"><input id="mean2_2" min="80" max="120" value="100" onchange="drawPlot()" style="text-align: center" type="number"></td>
              <td style="text-align: center"><input id="grp2_corr" min="-1" max="1" value="0" step="0.01" onchange="drawPlot()" style="text-align: center" type="number"></td>
            </tr>
            <tr>
              <td><br>
              </td>
            </tr>
            <tr>
            </tr>
            <tr>
              <td>
                <p>Sample size</p>
              </td>
              <td style="text-align: center"><input id="n" min="2" max="100" value="100" onchange="drawPlot()" style="text-align: center" type="number"></td>
              <td><br>
              </td>
            </tr>
          </tbody>
        </table>
        <br>
        <button onclick="drawPlot()"> Select another </button> </div>
    </div>
  

</body></html>
