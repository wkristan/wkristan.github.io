<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script>
    <title>Interactive Hotelling's T²</title>
    <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #cbd5e1;
      --grid: #e2e8f0;
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --red: #dc2626;
      --red-dark: #b91c1c;
      --slate: #475569;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 24px 0;
    }

    header {
      display: flex;
      gap: 16px;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2vw, 1.75rem);
      letter-spacing: -0.025em;
    }

    p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.45;
      max-width: 760px;
      font-size: 0.94rem;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      box-shadow: 0 1px 3px rgb(15 23 42 / 0.07);
      overflow: hidden;
    }

    .canvas-card { padding: 12px; }

    #plot {
      display: block;
      width: 100%;
      height: 520px;
      border-radius: 14px;
      background: white;
      touch-action: none;
      user-select: none;
    }

    aside {
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .panel { padding: 18px; }

    .control {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }

    .control:last-child { margin-bottom: 0; }

    .control-row,
    .metric-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    label, .metric-title {
      font-weight: 650;
      font-size: 0.93rem;
      color: #334155;
    }

    input[type="range"] { width: 100%; }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: #f1f5f9;
      color: #334155;
      padding: 4px 9px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .badge.primary {
      background: #0f172a;
      color: white;
      font-size: 0.9rem;
    }

    .note {
      margin-top: 14px;
      border-radius: 14px;
      background: #f1f5f9;
      color: var(--muted);
      padding: 12px;
      font-size: 0.82rem;
      line-height: 1.45;
    }

    button {
      appearance: none;
      border: 1px solid #cbd5e1;
      background: white;
      color: #334155;
      border-radius: 10px;
      padding: 9px 13px;
      font-weight: 650;
      cursor: pointer;
    }

    button:hover { background: #f8fafc; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .stat {
      border-radius: 14px;
      padding: 12px;
      background: white;
      border: 1px solid #e2e8f0;
    }

    .stat.blue { background: #eff6ff; border-color: #dbeafe; }
    .stat.red { background: #fef2f2; border-color: #fee2e2; }

    .stat-name {
      font-size: 0.82rem;
      font-weight: 700;
      color: #475569;
      margin-bottom: 4px;
    }

    .stat.blue .stat-name { color: #1e40af; }
    .stat.red .stat-name { color: #991b1b; }

    .stat-value {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.92rem;
    }

    .formula {
      margin-top: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 12px;
      background: white;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      overflow-x: auto;
    }

    .small-title {
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 4px;
    }

    @media (max-width: 900px) {
      header { align-items: flex-start; flex-direction: column; }
      .layout { grid-template-columns: 1fr; }
      aside { grid-template-columns: 1fr; }
    }
  </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Hotelling’s T²</h1>
        </div>
        <button id="resetBtn" type="button">Reset</button> </header>
      <section class="layout">
        <div class="card canvas-card">
          <svg id="plot" viewBox="0 0 760 520" aria-label="Interactive two-dimensional Hotelling's T squared plot">
            <defs>
              <pattern id="smallGrid" width="42" height="42" patternUnits="userSpaceOnUse">
                <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#e2e8f0" stroke-width="1"></path> </pattern> </defs>
            <rect width="760" height="520" fill="url(#smallGrid)"></rect>
            <g id="axes"></g>
            <line id="centroidLine" stroke="#475569" stroke-width="2" stroke-dasharray="7 7"></line>
            <g id="points1"></g>
            <g id="points2"></g>
            <g id="centroid1" class="centroid" role="button" aria-label="Drag group 1 centroid"></g>
            <g id="centroid2" class="centroid" role="button" aria-label="Drag group 2 centroid"></g>
            <text x="716" y="504" text-anchor="end" fill="#64748b" font-size="12">x variable</text>
            <text x="18" y="50" fill="#64748b" font-size="12">y variable</text> </svg> </div>
        <aside>
          <div class="card panel">
            <div class="control">
              <div class="control-row"> <label for="rho1">Group 1 correlation</label> <span class="badge" id="rho1Label">ρ = 0.25</span> </div>
              <input id="rho1" min="-0.95" max="0.95" step="0.01" value="0.25" type="range"> </div>
            <div class="control">
              <div class="control-row"> <label for="rho2">Group 2 correlation</label> <span class="badge" id="rho2Label">ρ = -0.35</span> </div>
              <input id="rho2" min="-0.95" max="0.95" step="0.01" value="-0.35" type="range"> </div>
          </div>
          <div class="card panel">
            <div class="stats-grid">
              <div class="stat blue">
                <div class="stat-name">Group 1 centroid</div>
                <div class="stat-value" id="mean1">—</div>
              </div>
              <div class="stat red">
                <div class="stat-name">Group 2 centroid</div>
                <div class="stat-value" id="mean2">—</div>
              </div>
              <div class="stat">
                <div class="stat-name">Difference in centroids</div>
                <div class="stat-value" id="meanDiff">—</div>
              </div>
            </div>
            <div class="formula" id="covarianceText">Sₚ = —</div>
            <div class="stat">
                <div class="stat-name">Equivalent F</div>
                <div class="stat-value" id="fValue">—</div>
                <div class="stat-name">p-value</div>
                <div class="stat-value" id="pval">—</div>
            </div>
          </div>
        </aside>
      </section>
    </main>
    <script>
    const W = 760;
    const H = 520;
    const PAD = 44;
    const X_MIN = -4;
    const X_MAX = 4;
    const Y_MIN = -3.2;
    const Y_MAX = 3.2;
    const N1 = 30;
    const N2 = 30;

    const plot = document.getElementById("plot");
    const axes = document.getElementById("axes");
    const points1El = document.getElementById("points1");
    const points2El = document.getElementById("points2");
    const centroid1El = document.getElementById("centroid1");
    const centroid2El = document.getElementById("centroid2");
    const centroidLine = document.getElementById("centroidLine");
    const rho1Input = document.getElementById("rho1");
    const rho2Input = document.getElementById("rho2");
    const rho1Label = document.getElementById("rho1Label");
    const rho2Label = document.getElementById("rho2Label");
    const resetBtn = document.getElementById("resetBtn");

    let rho1 = 0.25;
    let rho2 = -0.35;
    let centroid1 = [-1.05, 0.15];
    let centroid2 = [1.05, -0.15];
    let dragging = null;

    const base1 = fixedBasePoints(4123, N1);
    const base2 = fixedBasePoints(8841, N2);

    function mulberry32(seed) {
      return function rand() {
        let t = seed += 0x6d2b79f5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function normalPair(rand) {
      const u1 = Math.max(rand(), 1e-12);
      const u2 = rand();
      const r = Math.sqrt(-2 * Math.log(u1));
      const theta = 2 * Math.PI * u2;
      return [r * Math.cos(theta), r * Math.sin(theta)];
    }

    function fixedBasePoints(seed, n) {
      const rand = mulberry32(seed);
      const pts = [];
      while (pts.length < n) pts.push(normalPair(rand));

      const mx = pts.reduce((s, p) => s + p[0], 0) / n;
      const my = pts.reduce((s, p) => s + p[1], 0) / n;
      const sx = Math.sqrt(pts.reduce((s, p) => s + Math.pow(p[0] - mx, 2), 0) / (n - 1));
      const sy = Math.sqrt(pts.reduce((s, p) => s + Math.pow(p[1] - my, 2), 0) / (n - 1));

      return pts.map(([x, y]) => [(x - mx) / sx, (y - my) / sy]);
    }

    function applyCorrelation(base, rho, scale = 0.72) {
      const r = Math.max(-0.98, Math.min(0.98, rho));
      const c = Math.sqrt(1 - r * r);

      const transformed = base.map(([z1, z2]) => [
        scale * z1,
        scale * (r * z1 + c * z2)
      ]);

      // Recenter so changing correlation does not move the displayed centroid.
      const mx = transformed.reduce((s, p) => s + p[0], 0) / transformed.length;
      const my = transformed.reduce((s, p) => s + p[1], 0) / transformed.length;
      return transformed.map(([x, y]) => [x - mx, y - my]);
    }

    function toScreen([x, y]) {
      return [
        PAD + ((x - X_MIN) / (X_MAX - X_MIN)) * (W - 2 * PAD),
        H - PAD - ((y - Y_MIN) / (Y_MAX - Y_MIN)) * (H - 2 * PAD)
      ];
    }

    function fromScreen([sx, sy]) {
      return [
        X_MIN + ((sx - PAD) / (W - 2 * PAD)) * (X_MAX - X_MIN),
        Y_MIN + ((H - PAD - sy) / (H - 2 * PAD)) * (Y_MAX - Y_MIN)
      ];
    }

    function clampPoint([x, y]) {
      return [
        Math.max(X_MIN + 0.25, Math.min(X_MAX - 0.25, x)),
        Math.max(Y_MIN + 0.25, Math.min(Y_MAX - 0.25, y))
      ];
    }

    function mean(points) {
      const n = points.length;
      return [
        points.reduce((s, p) => s + p[0], 0) / n,
        points.reduce((s, p) => s + p[1], 0) / n
      ];
    }

    function covariance(points) {
      const [mx, my] = mean(points);
      let sxx = 0;
      let syy = 0;
      let sxy = 0;

      for (const [x, y] of points) {
        sxx += (x - mx) * (x - mx);
        syy += (y - my) * (y - my);
        sxy += (x - mx) * (y - my);
      }

      const d = points.length - 1;
      return [
        [sxx / d, sxy / d],
        [sxy / d, syy / d]
      ];
    }

    function pooledCov(a, b) {
      const s1 = covariance(a);
      const s2 = covariance(b);
      const n1 = a.length;
      const n2 = b.length;
      const denom = n1 + n2 - 2;

      return [
        [
          ((n1 - 1) * s1[0][0] + (n2 - 1) * s2[0][0]) / denom,
          ((n1 - 1) * s1[0][1] + (n2 - 1) * s2[0][1]) / denom
        ],
        [
          ((n1 - 1) * s1[1][0] + (n2 - 1) * s2[1][0]) / denom,
          ((n1 - 1) * s1[1][1] + (n2 - 1) * s2[1][1]) / denom
        ]
      ];
    }

    function inv2(m) {
      const det = m[0][0] * m[1][1] - m[0][1] * m[1][0];
      if (Math.abs(det) < 1e-10) return null;
      return [
        [m[1][1] / det, -m[0][1] / det],
        [-m[1][0] / det, m[0][0] / det]
      ];
    }

    function hotellingsT2(a, b) {
      const n1 = a.length;
      const n2 = b.length;
      const m1 = mean(a);
      const m2 = mean(b);
      const d = [m1[0] - m2[0], m1[1] - m2[1]];
      const sp = pooledCov(a, b);
      const inv = inv2(sp);
      if (!inv) return { t2: NaN, f: NaN, sp, d, m1, m2 };

      const q =
        d[0] * (inv[0][0] * d[0] + inv[0][1] * d[1]) +
        d[1] * (inv[1][0] * d[0] + inv[1][1] * d[1]);

      const t2 = (n1 * n2) / (n1 + n2) * q;
      const p = 2;
      const f = ((n1 + n2 - p - 1) / ((n1 + n2 - 2) * p)) * t2;
      const pval = 1-jStat.centralF.cdf(f, p, 60-p);
      return { t2, f, sp, d, m1, m2 , pval};
    }

    function fmt(x, digits = 3) {
      return Number.isFinite(x) ? x.toFixed(digits) : "—";
    }

    function pairFmt(p, digits = 2) {
      return `(${fmt(p[0], digits)}, ${fmt(p[1], digits)})`;
    }

    function pointerToData(event) {
      const rect = plot.getBoundingClientRect();
      const sx = ((event.clientX - rect.left) / rect.width) * W;
      const sy = ((event.clientY - rect.top) / rect.height) * H;
      return clampPoint(fromScreen([sx, sy]));
    }

    function makeSvgEl(name, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", name);
      for (const [key, value] of Object.entries(attrs)) el.setAttribute(key, value);
      return el;
    }

    function drawStaticAxes() {
      axes.innerHTML = "";
      axes.appendChild(makeSvgEl("line", { x1: PAD, y1: H / 2, x2: W - PAD, y2: H / 2, stroke: "#94a3b8", "stroke-width": 1.2 }));
      axes.appendChild(makeSvgEl("line", { x1: W / 2, y1: PAD, x2: W / 2, y2: H - PAD, stroke: "#94a3b8", "stroke-width": 1.2 }));
      axes.appendChild(makeSvgEl("rect", { x: PAD, y: PAD, width: W - 2 * PAD, height: H - 2 * PAD, fill: "none", stroke: "#cbd5e1", "stroke-width": 1.5 }));
    }

    function renderPoints(container, points, color) {
      container.innerHTML = "";
      for (const p of points) {
        const [x, y] = toScreen(p);
        container.appendChild(makeSvgEl("circle", {
          cx: x,
          cy: y,
          r: 4.3,
          fill: color,
          opacity: 0.55
        }));
      }
    }

    function renderCentroid(container, point, color, label, which) {
      container.innerHTML = "";
      const [x, y] = toScreen(point);
      container.style.cursor = "grab";

      const labelEl = makeSvgEl("text", {
        x,
        y: y - 23,
        "text-anchor": "middle",
        fill: "#1e293b",
        "font-size": 12,
        "font-weight": 700
      });
      labelEl.textContent = label;

      const circle = makeSvgEl("circle", {
        cx: x,
        cy: y,
        r: 15,
        fill: color,
        stroke: "white",
        "stroke-width": 4
      });

      container.appendChild(labelEl);
      container.appendChild(circle);
      container.onpointerdown = (event) => {
        dragging = which;
        plot.setPointerCapture(event.pointerId);
        const next = pointerToData(event);
        if (which === 1) centroid1 = next;
        if (which === 2) centroid2 = next;
        update();
      };
    }

    function updateStats(stats) {
      document.getElementById("mean1").textContent = pairFmt(stats.m1, 2);
      document.getElementById("mean2").textContent = pairFmt(stats.m2, 2);
      document.getElementById("meanDiff").textContent = pairFmt(stats.d, 2);
      document.getElementById("fValue").textContent = fmt(stats.f, 3);
      document.getElementById("covarianceText").innerHTML =
        `Sₚ =  ` + arrayToMathML(stats.sp) + `<br><br>` +
        `T² = n₁n₂/(n₁+n₂) · d′Sₚ⁻¹d = ` + stats.t2.toFixed(3);
      document.getElementById("pval").innerHTML = stats.pval.toFixed(4);
    }

    function update() {
      rho1Label.textContent = `ρ = ${rho1.toFixed(2)}`;
      rho2Label.textContent = `ρ = ${rho2.toFixed(2)}`;

      const offsets1 = applyCorrelation(base1, rho1);
      const offsets2 = applyCorrelation(base2, rho2);
      const group1 = offsets1.map(([x, y]) => [x + centroid1[0], y + centroid1[1]]);
      const group2 = offsets2.map(([x, y]) => [x + centroid2[0], y + centroid2[1]]);
      const stats = hotellingsT2(group1, group2);

      const [c1x, c1y] = toScreen(centroid1);
      const [c2x, c2y] = toScreen(centroid2);
      centroidLine.setAttribute("x1", c1x);
      centroidLine.setAttribute("y1", c1y);
      centroidLine.setAttribute("x2", c2x);
      centroidLine.setAttribute("y2", c2y);

      renderPoints(points1El, group1, "#2563eb");
      renderPoints(points2El, group2, "#dc2626");
      renderCentroid(centroid1El, centroid1, "#1d4ed8", "Group 1 centroid", 1);
      renderCentroid(centroid2El, centroid2, "#b91c1c", "Group 2 centroid", 2);
      updateStats(stats);
    }

    function arrayToMathML(array) {
      // Start the MathML structure
      let mathML = '<math xmlns="http://w3.org" display="inline">';
      mathML += '<mrow><mo fence="true" form="prefix" stretchy="true">[</mo><mrow><mtable>';

      // Map each row to an <mtr> element
      array.forEach(row => {
      mathML += '<mtr>';
      // Map each cell to an <mtd> element with an <mn> for the number
      row.forEach(cell => {
        mathML += `<mtd><mn>${cell.toFixed(2)}</mn></mtd>`;
        });
        mathML += '</mtr>';
      });

      mathML += '</mtable></mrow><mo fence="true" form="postfix" stretchy="true">]</mo></mrow></semantics></math>';
      return mathML;
    }

    plot.addEventListener("pointermove", (event) => {
      if (!dragging) return;
      const next = pointerToData(event);
      if (dragging === 1) centroid1 = next;
      if (dragging === 2) centroid2 = next;
      update();
    });

    plot.addEventListener("pointerup", () => { dragging = null; });
    plot.addEventListener("pointerleave", () => { dragging = null; });

    rho1Input.addEventListener("input", (event) => {
      rho1 = Number(event.target.value);
      update();
    });

    rho2Input.addEventListener("input", (event) => {
      rho2 = Number(event.target.value);
      update();
    });

    resetBtn.addEventListener("click", () => {
      rho1 = 0.25;
      rho2 = -0.35;
      centroid1 = [-1.05, 0.15];
      centroid2 = [1.05, -0.15];
      rho1Input.value = rho1;
      rho2Input.value = rho2;
      update();
    });

    drawStaticAxes();
    update();
  </script>
  </body>
</html>
