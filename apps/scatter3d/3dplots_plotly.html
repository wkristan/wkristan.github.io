<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<html>
  <head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <title>3D scatter plot</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link href="https://wkristan.github.io/style.css" rel="stylesheet" type="text/css">
    <script type="text/javascript" src="https://wkristan.github.io/main.js"></script>
  </head>
  <body>
    <div id="wrapper_div">
      <p>
        <select id="dataset" onchange="changeDataDrawPlot()">
          <option value="iris">Iris data</option>
          <option value="airquality">Air quality data</option>
          <option value="gapminder" selected="selected">GapMinder data</option>
          <option value="foods">Nutrients in food</option>
          <option value="bumpus">Bumpus' house sparrows</option>
        </select>
      </p>
      <div id="scatter3d_div" style="border: 2px solid black; width: 800px; height: 600px; float:left; margin-right: 10px">
      </div>
      <div id="controls_div" style="float:left">
        <p>X axis: <span id="put_x_axis_here"></span></p>
        <p>Y axis: <span id="put_y_axis_here"></span></p>
        <p>Z axis: <span id="put_z_axis_here"></span></p>
        <p>Color: <span id="put_color_var_here"></span></p>
        <p>Size: <span id="put_size_var_here"></span></p>
      </div>
    </div>
    <script type="text/javascript" src="data.js"></script>
    <script type="text/javascript" src="scatter3d_plotly.js"></script>
  </body>
</html>
